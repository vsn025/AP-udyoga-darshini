name: Crawl AP government job notifications
on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python scraper/scrape.py
      - name: Commit updated data
        run: |
          git config user.name "apjobs-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/jobs.json
          git diff --cached --quiet || git commit -m "crawl: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
